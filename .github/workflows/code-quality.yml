# Goal - I have to do SAST for my Code

name: Code Quality

on:
  workflow_call:    # you can call this workflow before/after any other workflow

jobs:
    sast:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
              node-version: '20'
              cache: 'npm'

          - name: Install Dependencies
            run: npm ci

          - name: Run Linter (ESLint)
            run: npm run lint

          - name: Run Tests (Jest)
            run: npm run test
      
          - name: GitHub CodeQL Scanning
            uses: github/codeql-action/analyze@v3
            if: always()
                
  