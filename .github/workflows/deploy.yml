#Goal : To Deploy the built images From CI steps once the CI Workflow is successful and all the security checks are passed. This workflow will be triggered by the DevSecOps CI workflow once all the jobs are completed successfully.

name: CD

on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        
      - name: Copy env file
        run: cp .env.example .env

      - name: Log in to DockerHub 
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy the container with docker-compose
        run: |
          docker compose down
          docker compose pull
          docker compose up -d

     
