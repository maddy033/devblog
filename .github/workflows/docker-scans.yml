#Goal - Ensure the docker file and docker images are security Tested and scanned for vulnerabilities
name: Docker Scans

on:
  workflow_call:

jobs:
  docker-file-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./Dockerfile

      - name: Docker setup-login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Docker Build 
        runs: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/devblog-app:latest .
        working-directory: ./devblog
      
      - name: Run Trivy vulnerability Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ vars.DOCKERHUB_USERNAME }}/devblog-app:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'