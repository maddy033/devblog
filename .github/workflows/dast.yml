#Goal - To ensure my running application is free from OWASP top 10 security vulnerabilities and issues.

name: OWASP ZAP DAST Scan

on:
  workflow_call:

jobs:
  dast:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Wait for application
        run: |
          timeout 180s sh -c 'until curl -s http://${{ secrets.EC2_HOST }}:3000 > /dev/null; do echo "waiting for app..."; sleep 5; done'

      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://${{ secrets.EC2_HOST }}:3000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap_scan
          cmd_options: '-a'